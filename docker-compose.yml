# Local + deployable stack: FastAPI backend (serves the API and the static
# frontend) + MySQL. Copy .env.example to .env before running.
#
#   docker compose up --build
#
# Backend:  http://localhost:8000        (website)
# API docs: http://localhost:8000/api/docs
services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    # Host port for optional external access (e.g. a DB GUI). The backend talks
    # to MySQL over the internal network, so this isn't required by the app.
    # Defaults to 3307 to avoid clashing with a local MySQL on 3306.
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DB: ${MYSQL_DB}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
    ports:
      - "${BACKEND_PORT:-8000}:8000"

volumes:
  db_data:
