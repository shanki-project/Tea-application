name: CI/CD - Shankis Tea

# Stage 1: Trigger — runs on every push to main, and on pull requests targeting main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}



jobs:
  # ---------------------------------------------------------------------
  # CI: fetch code -> install deps & build -> run tests
  # ---------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      # Stage 2: Fetch the code
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      # Stage 3: Install deps & build
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      # Stage 4: Run tests (lint + unit/integration)
      # Note: tests run against an in-memory SQLite DB (see tests/conftest.py),
      # so no MySQL service container is needed here — this job stays fast and simple.
      - name: Lint with ruff
        working-directory: backend
        run: ruff check .

      - name: Run pytest
        working-directory: backend
        run: pytest -v

  # ---------------------------------------------------------------------
  # CI: package artifact -> push to registry
  # Only runs after tests pass, and only on pushes to main (not on PRs) —
  # we don't want every PR building and pushing an image.
  # ---------------------------------------------------------------------
  build-and-push:
    name: Build & push image
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Sets up the "docker-container" buildx driver, which is required for
      # the GitHub Actions cache backend (cache-to/cache-from: type=gha) below.
      # The default "docker" driver on GitHub-hosted runners doesn't support it.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker image names must be entirely lowercase, but github.repository
      # preserves the repo's actual case (e.g. "Tea-application"). This
      # computes a lowercase version and exports it for later steps.
      - name: Set lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Stage 5: Package artifact
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------
  # CD: deploy -> health check -> (rollback is manual here; see notes below)
  # ---------------------------------------------------------------------
  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production   # lets you require manual approval in repo Settings > Environments
    steps:
      # Stage 7: Deploy — SSH into the EC2 instance and pull + restart the stack
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP_DIR=~/Tea-application

            # Clone the repo the first time; pull the latest on every run after
            # that. Runs as ec2-user (whoever SSH logs in as), so ownership is
            # correct automatically — no manual copying or chown needed.
            # Note: .env is gitignored, so it's never touched by clone/pull —
            # it must already exist in APP_DIR from your one-time manual setup.
            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git fetch origin main
              git reset --hard origin/main
            else
              git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
              cd "$APP_DIR"
            fi

            IMAGE_NAME="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull "$IMAGE_NAME:latest"
            # --wait blocks here until every service's HEALTHCHECK reports
            # healthy (or times out after --wait-timeout), instead of a guessed
            # sleep — this is what fixes cold-start deploys taking 30-60+ seconds.
            docker compose up -d --no-build --wait --wait-timeout 120
            docker image prune -f

      # Stage 8: Health check — fail the whole workflow if the app didn't come back up
      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            curl -fsS http://localhost:8000/api/health
            curl -fsS http://localhost:8000/api/health/db

      # Stage 9: Monitor & rollback
      # This workflow does not auto-rollback (that needs more infrastructure —
      # e.g. keeping the previous image tag and re-deploying it on failure).
      # For now: if "Verify deployment" fails, the job goes red in the Actions
      # tab and you get a notification — that's your signal to manually run
      # `docker compose up -d` with the previous :sha tag on the EC2 box.
