<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop — Shankis Tea</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="container">
    <h1 class="page-title">The Collection</h1>
    <p class="page-sub">Organic blends · Assam origin</p>

    <div class="row" style="margin-bottom:32px; flex-wrap:wrap">
      <input class="input" id="search" placeholder="Search blends or ingredients…" style="max-width:320px" />
      <select class="input" id="category" style="max-width:200px">
        <option value="">All categories</option>
      </select>
    </div>

    <div class="grid" id="grid"><p class="muted">Loading…</p></div>
  </div>

  <!-- Product detail / reviews drawer -->
  <div id="detail" class="modal-backdrop hidden">
    <div class="modal" style="max-width:560px; text-align:left; max-height:88vh; overflow:auto">
      <div id="detailBody"></div>
      <button class="btn ghost small" id="closeDetail" style="margin-top:18px">Close</button>
    </div>
  </div>

  <script type="module">
    import { api, auth, money } from "./js/api.js";
    import { mountNav, toast, refreshCartCount } from "./js/ui.js";
    mountNav("shop");

    const grid = document.getElementById("grid");
    let products = [];

    function card(p) {
      const low = p.is_low_stock && p.stock_qty > 0;
      const out = p.stock_qty <= 0;
      return `
        <div class="card product-card">
          ${p.image_url ? `<img src="${p.image_url}" alt="${p.name}" />` : ""}
          <div class="name">${p.name}</div>
          <div class="blend">${p.category || ""}</div>
          <div class="ingredients">${p.ingredients || ""}</div>
          <div class="price">${money(p.price)}</div>
          <div class="row between" style="margin-top:auto">
            <button class="btn small" data-add="${p.id}" ${out ? "disabled" : ""}>
              ${out ? "Sold Out" : "Add to Ritual"}
            </button>
            <button class="btn ghost small" data-view="${p.slug}">Details</button>
          </div>
          ${low ? '<div class="badge low" style="margin-top:10px">Low stock</div>' : ""}
        </div>`;
    }

    async function load() {
      const qs = new URLSearchParams();
      if (document.getElementById("search").value) qs.set("q", document.getElementById("search").value);
      if (document.getElementById("category").value) qs.set("category", document.getElementById("category").value);
      products = await api.products(qs.toString() ? "?" + qs.toString() : "");
      grid.innerHTML = products.length ? products.map(card).join("") : '<p class="muted">No products found.</p>';
    }

    async function loadCategories() {
      const all = await api.products();
      const cats = [...new Set(all.map((p) => p.category).filter(Boolean))];
      const sel = document.getElementById("category");
      cats.forEach((c) => {
        const o = document.createElement("option");
        o.value = c; o.textContent = c; sel.appendChild(o);
      });
    }

    async function addToCart(productId) {
      if (!auth.isLoggedIn) {
        // Remember the intent so we can finish it right after login.
        localStorage.setItem("pending_cart_add", String(productId));
        window.location.href = "login.html?next=/shop.html";
        return;
      }
      if (auth.user?.role !== "customer") { toast("Only customers can shop", "error"); return; }
      try {
        await api.addToCart({ product_id: Number(productId), quantity: 1 });
        toast("Added to your ritual");
        refreshCartCount();
      } catch (err) { toast(err.message, "error"); }
    }

    grid.addEventListener("click", async (e) => {
      if (e.target.dataset.add) addToCart(e.target.dataset.add);
      if (e.target.dataset.view) openDetail(e.target.dataset.view);
    });

    // Resume a pending "add to cart" after the guest logs in and returns here.
    (async () => {
      const pending = localStorage.getItem("pending_cart_add");
      if (pending && auth.isLoggedIn && auth.user?.role === "customer") {
        localStorage.removeItem("pending_cart_add");
        await addToCart(pending);
      }
    })();

    async function openDetail(slug) {
      const p = await api.product(slug);
      const reviews = await api.reviews(p.id);
      const avg = reviews.length ? (reviews.reduce((s, r) => s + r.rating, 0) / reviews.length).toFixed(1) : null;
      document.getElementById("detailBody").innerHTML = `
        ${p.image_url ? `<img src="${p.image_url}" style="width:100%;height:240px;object-fit:cover" />` : ""}
        <h2 style="font-size:34px;margin:14px 0 2px;color:var(--amber);letter-spacing:.18em;text-transform:uppercase">${p.name}</h2>
        <p class="muted" style="margin:0 0 10px">${p.category || ""} · ${money(p.price)}</p>
        <p>${p.description || ""}</p>
        <p class="note muted"><strong>Ingredients:</strong> ${p.ingredients || "—"}</p>
        <p class="note muted">In stock: ${p.stock_qty}</p>
        <button class="btn solid small" data-detail-add="${p.id}" ${p.stock_qty <= 0 ? "disabled" : ""}>
          ${p.stock_qty <= 0 ? "Sold Out" : "Add to Ritual"}
        </button>
        <hr style="border-color:var(--line);margin:18px 0" />
        <h3 style="margin:0 0 10px">Reviews ${avg ? `· ${avg}★ (${reviews.length})` : ""}</h3>
        ${
          reviews.length
            ? reviews.map((r) => `<div style="margin-bottom:12px"><strong>${"★".repeat(r.rating)}</strong> <span class="muted">${r.user_name || "Customer"}</span><br><span class="note">${r.comment || ""}</span></div>`).join("")
            : '<p class="muted note">No reviews yet.</p>'
        }
        <p class="note muted" style="margin-top:14px">Purchased this? Leave a review from your <a href="account.html">Account</a>.</p>`;
      document.getElementById("detail").classList.remove("hidden");
    }

    document.getElementById("detailBody").addEventListener("click", (e) => {
      if (e.target.dataset.detailAdd) addToCart(e.target.dataset.detailAdd);
    });
    document.getElementById("closeDetail").addEventListener("click", () =>
      document.getElementById("detail").classList.add("hidden")
    );
    document.getElementById("search").addEventListener("input", debounce(load, 300));
    document.getElementById("category").addEventListener("change", load);
    function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

    loadCategories();
    load();
  </script>
</body>
</html>
